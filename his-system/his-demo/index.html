<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS — Hospital Information System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { navy: { 950:'#0a1628', 900:'#0d1f33', 800:'#152840', 700:'#1e3a5f', 600:'#254e7a' } } } }
}
</script>
<style>
body { font-family: 'Segoe UI', system-ui, sans-serif; }
.sidebar-link { display:flex; align-items:center; gap:10px; padding:9px 16px; border-radius:6px; cursor:pointer; color:#94a3b8; font-size:13.5px; transition:all .15s; }
.sidebar-link:hover { background:#1e3a5f; color:#e2e8f0; }
.sidebar-link.active { background:#1e3a5f; color:#fff; border-left:3px solid #2563eb; padding-left:13px; }
.sidebar-cat { font-size:11px; font-weight:600; color:#475569; text-transform:uppercase; letter-spacing:.08em; padding:14px 16px 4px; }
.badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:999px; font-size:11.5px; font-weight:600; }
.badge-green  { background:#dcfce7; color:#15803d; }
.badge-blue   { background:#dbeafe; color:#1d4ed8; }
.badge-yellow { background:#fef3c7; color:#b45309; }
.badge-red    { background:#fee2e2; color:#b91c1c; }
.badge-gray   { background:#f1f5f9; color:#475569; }
.badge-purple { background:#f3e8ff; color:#7e22ce; }
.badge-orange { background:#fff7ed; color:#c2410c; }
.kpi-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:18px 20px; }
.step-done    { background:#2563eb; color:#fff; border:2px solid #2563eb; }
.step-active  { background:#fff; color:#2563eb; border:2px solid #2563eb; }
.step-pending { background:#fff; color:#94a3b8; border:2px solid #cbd5e1; }
.step-line-done    { background:#2563eb; }
.step-line-pending { background:#e2e8f0; }
table thead tr { background:#f8fafc; }
table thead th { padding:10px 14px; text-align:left; font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
table tbody td { padding:11px 14px; font-size:13.5px; color:#1e293b; border-bottom:1px solid #f1f5f9; }
table tbody tr:hover { background:#fafbff; }
.btn-primary { background:#2563eb; color:#fff; padding:8px 18px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:6px; }
.btn-primary:hover { background:#1d4ed8; }
.btn-outline { background:#fff; color:#374151; padding:8px 16px; border-radius:7px; font-size:13.5px; font-weight:500; cursor:pointer; border:1px solid #d1d5db; display:inline-flex; align-items:center; gap:6px; }
.btn-outline:hover { background:#f9fafb; }
.btn-danger { background:#fff; color:#dc2626; padding:8px 16px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer; border:1px solid #fca5a5; display:inline-flex; align-items:center; gap:6px; }
.btn-success { background:#16a34a; color:#fff; padding:8px 18px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:6px; }
.btn-success:hover { background:#15803d; }
.form-label { font-size:12.5px; font-weight:600; color:#374151; margin-bottom:4px; display:block; }
.form-input { width:100%; border:1px solid #d1d5db; border-radius:6px; padding:8px 12px; font-size:13.5px; color:#1e293b; background:#fff; outline:none; }
.form-input:focus { border-color:#2563eb; box-shadow:0 0 0 3px #dbeafe; }
.form-select { width:100%; border:1px solid #d1d5db; border-radius:6px; padding:8px 12px; font-size:13.5px; color:#1e293b; background:#fff; }
.form-textarea { width:100%; border:1px solid #d1d5db; border-radius:6px; padding:8px 12px; font-size:13.5px; color:#1e293b; background:#fff; outline:none; resize:vertical; }
.card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; }
.section-title { font-size:14.5px; font-weight:700; color:#1e293b; }
.page-title { font-size:22px; font-weight:700; color:#0f172a; }
.breadcrumb { font-size:12.5px; color:#64748b; display:flex; align-items:center; gap:6px; }
.breadcrumb span { color:#94a3b8; }
.required { color:#ef4444; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; display:flex; align-items:center; justify-content:center; }
.modal-box { background:#fff; border-radius:16px; padding:28px; width:480px; max-width:95vw; box-shadow:0 20px 60px rgba(0,0,0,.25); max-height:90vh; overflow-y:auto; }
</style>
</head>
<body class="bg-slate-100" onload="initApp()">

<div id="app"></div>

<!-- Load shared helpers first -->
<script src="shared.js"></script>

<!-- Registration & Front Desk (load order: patient first, others depend on it) -->
<script src="pg-reg-patient.js"></script>
<script src="pg-reg-home.js"></script>
<script src="pg-reg-desk.js"></script>
<script src="pg-reg-appointments.js"></script>
<script src="pg-reg-bed.js"></script>

<!-- OPD Management (depends on pg-reg-appointments.js for _APT_DOCTORS) -->
<script src="pg-opd-queue.js"></script>
<script src="pg-opd-nurse.js"></script>
<script src="pg-opd-consult.js"></script>

<!-- Billing -->
<script src="pg-billing.js"></script>

<!-- Load shell + nav (must come after page files) -->
<script src="login.js"></script>

<script>
// ─── ALL_PAGES: register every page function here ────────────────────────────
const ALL_PAGES = {
  // Patient Journey
  'journey':           pageJourney,

  // Registration & Front Desk
  'reg-home':          pageRegHome,
  'reg-desk':          pageRegDesk,
  'patient-reg':       pagePatientReg,
  'opd-queue':         pageOpdQueue,
  'opd-nurse':         pageOpdNurse,
  'opd-consult':       pageOpdConsult,
  'appointments':      pageAppointments,
  'bed-status':        pageBedStatus,

  // Billing
  'dashboard':         pageDashboard,
  'setup-tariff':      pageSetupTariff,
  'setup-packages':    pageSetupPackages,
  'setup-insurance':   pageSetupInsurance,
  'opd-registration':  pageOPDRegistration,
  'opd-procedures':    pageOPDProcedures,
  'ipd-admission':     pageIPDAdmission,
  'ipd-charges':       pageIPDCharges,
  'ipd-finalbill':     pageIPDFinalBill,
  'ipd-daycare':       pageIPDDaycare,
  'ipd-provisional':   pageIPDProvisional,
  'ins-preauth':       pageInsPreauth,
  'ins-cashless':      pageInsCashless,
  'corp-billing':      pageCorpBilling,
  'corp-govt':         pageCorpGovt,
  'ref-refund':        pageRefRefund,
  'ref-cancel':        pageRefCancel,
  'ref-duplicate':     pageRefDuplicate,
  'mis-daily':         pageMISDaily,
  'mis-audit':         pageMISAudit,
  'mis-revenue':       pageMISRevenue,
  'mis-leakage':       pageMISLeakage,
  'comp-gst':          pageCompGST,
};
</script>
</body>
</html>
